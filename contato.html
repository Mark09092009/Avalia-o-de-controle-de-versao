<main>
    <h1>Contato</h1>

    <p>
        Envie uma mensagem para nossa equipe através do formulário abaixo.
    </p>

    <div class="cards">
        <div class="card">
            <h3>E-mail</h3>
            <p>contato@ifpi.edu.br</p>
        </div>

        <div class="card">
            <h3>Telefone</h3>
            <p>(89) 99999-9999</p>
        </div>

        <div class="card">
            <h3>Localização</h3>
            <p>IFPI - Campus Paulistana</p>
        </div>
    </div>

    <form class="formulario">
        <input class="campo" type="text" placeholder="Nome">

        <input class="campo" type="email" placeholder="E-mail">

        <input class="campo" type="tel" placeholder="Telefone">

        <input class="campo" type="text" placeholder="Assunto">

        <textarea class="campo" placeholder="Mensagem"></textarea>

        <button class="botao" type="submit">
            Enviar
        </button>
    </form>
</main>
</html>
